name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPO: 917151957449.dkr.ecr.us-west-2.amazonaws.com/mica
  INSTANCE_TAG_NAME: dev-mica-app

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REPO }}:dev-${{ github.sha }}
            ${{ env.ECR_REPO }}:dev-latest

      - name: Install SSM Session Manager plugin
        run: |
          curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_arm64/session-manager-plugin.deb" \
            -o /tmp/ssm-plugin.deb
          sudo dpkg -i /tmp/ssm-plugin.deb

      - name: Deploy to EC2 via SSM Session
        env:
          DEPLOY_TAG: dev-${{ github.sha }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.INSTANCE_TAG_NAME }}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          echo "Deploying $DEPLOY_TAG to $INSTANCE_ID"

          aws ssm start-session \
            --target "$INSTANCE_ID" \
            --document-name "AWS-StartInteractiveCommand" \
            --parameters "{\"command\":[\"sudo bash /usr/local/bin/mica-deploy ${DEPLOY_TAG}\"]}"
