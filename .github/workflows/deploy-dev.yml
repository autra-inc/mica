name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPO: 917151957449.dkr.ecr.us-west-2.amazonaws.com/mica
  INSTANCE_TAG_NAME: dev-mica-app

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ECR_REPO }}:dev-${{ github.sha }}
            ${{ env.ECR_REPO }}:dev-latest

      - name: Deploy to EC2 via SSM
        env:
          DEPLOY_TAG: dev-${{ github.sha }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ env.INSTANCE_TAG_NAME }}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          echo "Instance: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:Name,Values=${{ env.INSTANCE_TAG_NAME }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"bash /usr/local/bin/mica-deploy ${DEPLOY_TAG}\"],\"executionTimeout\":[\"300\"]}" \
            --query Command.CommandId --output text)
          echo "SSM Command: $COMMAND_ID"

          sleep 10
          for i in $(seq 1 60); do
            RESULT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --output json 2>/dev/null || echo '{"Status":"Pending"}')
            STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('Status','Pending'))")
            DETAILS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('StatusDetails',''))")
            echo "[$i] Status: $STATUS | $DETAILS"
            if [ "$STATUS" = "Success" ]; then
              echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('StandardOutputContent',''))"
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "--- Full SSM response ---"
              echo "$RESULT"
              exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for deployment"
          exit 1
